name: CI · E2E

on:
  push:
    branches: [main]
    paths:
      - 'packages/**'
  pull_request:
    branches: [main]

jobs:
  e2e-wam:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: E2E · packages/wam (印 65 三清守门 · 印 101 大道至简 · cleanup-2026-05-16)
        run: |
          cd packages/wam
          node _test_in_use.cjs
          node _test_quota.cjs
          node _test_set_health.cjs
          node _test_e2e_msg_rotate.cjs

      - name: Build VSIX
        run: node scripts/build-vsix.js wam

      - name: Upload VSIX
        uses: actions/upload-artifact@v7
        with:
          name: wam-vsix
          path: packages/wam/*.vsix
          retention-days: 30

  e2e-dao-proxy-min:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Strip test · v9.8.0 守一不离
        run: node packages/dao-proxy-min/_审视/_v980_strip_test.js
        # 验: stripSideChannelBlocks 保留 <additional_metadata> · hasSideChannels lastIndex 重置

      - name: Build VSIX
        run: node scripts/build-vsix.js dao-proxy-min

      - name: Upload VSIX
        uses: actions/upload-artifact@v7
        with:
          name: dao-proxy-min-vsix
          path: packages/dao-proxy-min/*.vsix
          retention-days: 30
