name: dao-boot

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "mode"
        required: false
        default: "proxy"
      gist_id:
        description: "existing gist id"
        required: false
        default: ""
      accounts_override:
        description: "override accounts"
        required: false
        default: ""

permissions:
  contents: read
  actions: write
  models: read

jobs:
  relay:
    name: "dao reverse proxy + cloudflare tunnel"
    runs-on: ubuntu-latest
    timeout-minutes: 340
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install cloudflared
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb -o /tmp/cf.deb
          sudo dpkg -i /tmp/cf.deb
          cloudflared --version
      - name: Run reverse proxy + tunnel
        env:
          DAO_ACCOUNTS: ${{ github.event.inputs.accounts_override || secrets.ACCOUNTS }}
          GITHUB_TOKEN: ${{ secrets.DAO_GH_PAT || secrets.GITHUB_TOKEN }}
          DAO_GIST_ID: ${{ github.event.inputs.gist_id || secrets.DAO_GIST_ID }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          HUB_PORT: "7799"
          DAO_DEBUG: "0"
          DAO_BACKEND_PRIORITY: "gh,windsurf,devin"
          DAO_MAX_ROTATIONS: "163"
          DAO_DEVIN_TIMEOUT_MS: "180000"
        run: node dao_proxy.js proxy
