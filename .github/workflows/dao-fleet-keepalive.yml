name: dao-fleet-keepalive

# ════════════════════════════════════════════════════════════════════
# 印 95 · keepalive · 全死则触 dao-fleet-cloud · 防 cron 间隙裸
#
#   帛书·六十三: 「为之于其未有也 · 治之于其未乱也」
#   帛书·六十四: 「合抱之木 · 生于毫末」
#
# 此 workflow 不真起 daemon · 仅
#   ① 拉 gist · 看 daemons 池
#   ② 0 alive → 触 dao-fleet-cloud workflow
#   ≥ 1 alive → 啥不做 (省 ACU · 守 帛书·七十六「兵强则不胜」)
#
# 触发: cron 每 30 分 · 防 cron 5h 之间裸时段
# ════════════════════════════════════════════════════════════════════

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'  # 每 30 min

permissions:
  contents: read
  actions: write   # 触发 dao-fleet-cloud workflow 所需

jobs:
  check:
    if: github.repository_owner == 'zhouyoukang'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 一 · checkout
        uses: actions/checkout@v4

      - name: 二 · setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 三 · 探 gist daemons + 决断
        id: probe
        env:
          DAO_POOL_GIST_ID: ${{ secrets.DAO_POOL_GIST_ID }}
          DAO_POOL_PAT: ${{ secrets.DAO_POOL_PAT }}
        run: |
          set +e
          echo "════════════════════════════════════════"
          echo "§ keepalive 探 · $(date -u)"
          echo "════════════════════════════════════════"

          if [ -z "$DAO_POOL_GIST_ID" ] || [ -z "$DAO_POOL_PAT" ]; then
            echo "  ✗ 缺 secrets · 跳"
            echo "TRIGGER=skip" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          cd packages/dao-pool

          # 拉现态 + 清过期 (>15min 无报)
          node cli.js prune \
            --gist "$DAO_POOL_GIST_ID" \
            --pat "$DAO_POOL_PAT" \
            --max 15 || echo "  ⚠ prune 失"

          # 看活 daemon 数 + 各探 /health (防 gist 报但 cf 隧道死)
          DAEMONS_JSON=$(node cli.js daemons \
            --gist "$DAO_POOL_GIST_ID" \
            --pat "$DAO_POOL_PAT" \
            --json 2>/dev/null || echo '[]')

          ALIVE=0
          TOTAL=$(echo "$DAEMONS_JSON" | node -e "let d='';process.stdin.on('data',c=>d+=c).on('end',()=>{try{console.log(JSON.parse(d).length)}catch{console.log(0)}})")

          # 真探每 daemon /health (一并发)
          if [ "$TOTAL" -gt 0 ]; then
            URLS=$(echo "$DAEMONS_JSON" | node -e "let d='';process.stdin.on('data',c=>d+=c).on('end',()=>{try{JSON.parse(d).forEach(x=>console.log(x.url))}catch{}})")
            while IFS= read -r url; do
              if [ -z "$url" ]; then continue; fi
              if curl -fsS --max-time 8 "$url/health" -o /dev/null 2>/dev/null; then
                echo "  ✓ $url"
                ALIVE=$((ALIVE + 1))
              else
                echo "  ✗ $url (cf 死或 daemon 死)"
              fi
            done <<< "$URLS"
          fi

          echo ""
          echo "  报: $TOTAL · 活: $ALIVE"

          # 决断: 0 活 → 触 (不论 gist 报多少 · 真验为准)
          if [ "$ALIVE" -eq 0 ]; then
            echo "TRIGGER=yes" >> "$GITHUB_OUTPUT"
            echo "  → 全死 · 触 dao-fleet-cloud"
          else
            echo "TRIGGER=no" >> "$GITHUB_OUTPUT"
            echo "  → 已有活 · 不触 (省 ACU)"
          fi

      - name: 四 · 触 dao-fleet-cloud (仅全死时)
        if: steps.probe.outputs.TRIGGER == 'yes'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run dao-fleet-cloud.yml \
            -R ${{ github.repository }} \
            -f max_minutes=300 \
            -f auth_required=yes
          echo "  ✓ dao-fleet-cloud 已触"
