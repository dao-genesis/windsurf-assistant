name: Test dao-core + web + auth

on:
  push:
    branches: [main]
    paths:
      - 'packages/dao-core/**'
      - 'web/**'
      - 'tests/**'
      - 'scripts/**'
      - '.github/workflows/test-core.yml'
  pull_request:
    paths:
      - 'packages/dao-core/**'
      - 'web/**'
      - 'tests/**'
      - 'scripts/**'
  workflow_dispatch:

jobs:
  test:
    name: Zero-dep · 无为而无不为
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Syntax check all dao-core files
        run: |
          cd packages/dao-core
          for f in *.js; do
            echo "Checking $f..."
            node -c "$f" || exit 1
          done
          echo "All dao-core files OK"

      - name: Syntax check bootstrap shell
        run: |
          bash -n scripts/devin-bootstrap.sh
          echo "bootstrap.sh OK"

      - name: Run full test suite
        run: |
          node tests/run_all.cjs

      - name: Verify zero npm deps
        run: |
          if [ -d packages/dao-core/node_modules ]; then
            echo "FATAL: node_modules found · zero-dep contract violated"
            exit 1
          fi
          # ensure package.json declares no dependencies
          DEPS=$(node -p "Object.keys(require('./packages/dao-core/package.json').dependencies||{}).length")
          if [ "$DEPS" != "0" ]; then
            echo "FATAL: package.json has $DEPS dependencies · zero-dep contract violated"
            exit 1
          fi
          echo "Zero deps confirmed"
