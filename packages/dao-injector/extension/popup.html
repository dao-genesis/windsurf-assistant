<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>道·Devin 网页端 SP 注入器</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header>
      <h1>道·Devin SP 注入器</h1>
      <span class="badge" id="badge-state">--</span>
    </header>

    <section class="kv">
      <div><span class="k">daemon</span><span class="v" id="kv-daemon">--</span></div>
      <div><span class="k">帛书</span><span class="v" id="kv-silk">--</span></div>
      <div><span class="k">hooked</span><span class="v" id="kv-hooked">--</span></div>
      <div><span class="k">注入</span><span class="v" id="kv-injected">--</span></div>
    </section>

    <section class="strategy">
      <h2>策略 (反者道之动 · 六式)</h2>
      <div class="radio-grid">
        <label><input type="radio" name="strategy" value="bypass" /><span>bypass<small>不动</small></span></label>
        <label><input type="radio" name="strategy" value="dao" /><span>dao ★<small>帛书全文</small></span></label>
        <label><input type="radio" name="strategy" value="custom" /><span>custom<small>自定 SP</small></span></label>
        <label><input type="radio" name="strategy" value="override" /><span>override<small>覆盖</small></span></label>
        <label><input type="radio" name="strategy" value="prepend" /><span>prepend<small>前置</small></span></label>
        <label><input type="radio" name="strategy" value="append" /><span>append<small>后置</small></span></label>
      </div>
    </section>

    <section class="sp-edit" id="sec-custom" style="display:none">
      <h2>customSp · 自定 SP 全文</h2>
      <textarea id="ta-custom" rows="5" placeholder="custom 策略之 SP"></textarea>
    </section>

    <section class="sp-edit" id="sec-global" style="display:none">
      <h2>globalSp · override / prepend / append 用</h2>
      <textarea id="ta-global" rows="5" placeholder="override / prepend / append 之 SP"></textarea>
    </section>

    <section class="actions">
      <button id="btn-save">保存 · 推全标签</button>
      <button id="btn-sync">立即同步 daemon</button>
      <label class="toggle">
        <input type="checkbox" id="cb-enabled" /> 启用注入器
      </label>
      <label class="toggle">
        <input type="checkbox" id="cb-debug" /> 调试日志
      </label>
    </section>

    <section class="observe">
      <h2>近 5 笔注入 observe</h2>
      <ol id="ol-observe"></ol>
    </section>

    <footer>
      <span>印 88 · 反者道之动 · v1.0.0</span>
      <span>道法自然 · 无为而无不为</span>
    </footer>

    <script src="popup.js"></script>
  </body>
</html>
